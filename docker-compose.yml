version: "3.9"

services:
  smartscrapeai:
    build: .
    container_name: smartscrapeai
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - TZ=Asia/Jakarta
      # C3 Storage (opsional)
      # - C3_ENDPOINT=https://<account>.r2.cloudflarestorage.com
      # - C3_BUCKET=smartscrapeai
      # - C3_ACCESS_KEY=
      # - C3_SECRET_KEY=
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
