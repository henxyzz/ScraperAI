version: '3.8'

services:
  smartscrapeai:
    build: .
    container_name: smartscrapeai
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NODE_ENV=production
      - TZ=Asia/Jakarta
    restart: unless-stopped
    volumes:
      - ./scrapers:/app/scrapers
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
